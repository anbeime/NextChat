name: Sync from Upstream
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ChatGPTNextWeb/NextChat.git
      - name: Fetch upstream
        run: |
          git fetch upstream
      - name: Check upstream updates
        id: check_upstream
        run: |
          upstream_main="upstream/dev"
          current_branch=$(git rev-parse --abbrev-ref HEAD)
          
          echo "Fetching commits from upstream ($upstream_main)..."
          git fetch upstream dev
          
          local_hash=$(git rev-parse HEAD)
          upstream_hash=$(git rev-parse upstream/dev)
          
          echo "Local commit: $local_hash"
          echo "Upstream commit: $upstream_hash"
          
          if [ "$local_hash" != "$upstream_hash" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi
      - name: Merge upstream changes
        if: steps.check_upstream.outputs.has_updates == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git merge upstream/dev --no-edit
      - name: Check for conflicts
        id: check_conflicts
        run: |
          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "conflicted_files=$(git diff --name-only --diff-filter=U)" >> $GITHUB_OUTPUT
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          fi
      - name: Resolve conflicts (accept upstream)
        if: steps.check_conflicts.outputs.has_conflicts == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git checkout --ours .
          git add .
          git commit -m "Merge upstream/dev with conflict resolution (accept upstream)"
      - name: Check for changes to push
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git push
      - name: Summary
        run: |
          echo "## 📊 Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Upstream:** ChatGPTNextWeb/NextChat" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_upstream.outputs.has_updates }}" == "true" ]; then
            echo "✅ Upstream has updates" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Already up-to-date with upstream" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_conflicts.outputs.has_conflicts }}" == "true" ]; then
            echo "⚠️ Conflicts resolved (accepted upstream):" >> $GITHUB_STEP_SUMMARY
            echo "  \`${{ steps.check_conflicts.outputs.conflicted_files }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            echo "✅ Changes pushed to \`$(git rev-parse --abbrev-ref HEAD)\`" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 Dry run - no changes pushed" >> $GITHUB_STEP_SUMMARY
          fi
